<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spell Checker</title>
</head>
<body>

<main>

  <h1>Basic English Spell Checker</h1>
  <div id="container"></div>
  <!-- INPUT -->
  <label for="text-input">Enter text:</label>
  <textarea 
    id="text-input"
    rows="6"
    spellcheck="false"
  ></textarea>

  <button id="check-btn" type="button">
    Spell Check
  </button>

  <!-- OUTPUT -->
  <label for="output-area">Output:</label>
  <textarea 
    id="output-area"
    rows="4"
    readonly
  ></textarea>

</main>

<script type="module" src="app.js"></script>
</body>
</html>
